name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      version:
        description: 'Version to deploy (leave empty for latest)'
        required: false
        type: string

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        pip install -e .[dev]
        cd frontend && npm ci
        
    - name: Run database migrations
      run: |
        alembic upgrade head
      env:
        DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        
    - name: Build frontend
      run: |
        cd frontend && npm run build
        
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        # Add your staging deployment logic here
        # Example: Docker deployment
        docker build -t agentic-rag:staging .
        docker tag agentic-rag:staging ${{ secrets.STAGING_REGISTRY }}/agentic-rag:staging
        docker push ${{ secrets.STAGING_REGISTRY }}/agentic-rag:staging
        
        # Or Kubernetes deployment
        # kubectl apply -f k8s/staging/
        # kubectl rollout status deployment/agentic-rag-staging
        
    - name: Health check
      run: |
        echo "🏥 Performing health check..."
        sleep 30  # Wait for deployment to stabilize
        curl -f ${{ secrets.STAGING_URL }}/api/v1/health || exit 1
        
    - name: Run smoke tests
      run: |
        echo "🧪 Running smoke tests..."
        curl -X POST "${{ secrets.STAGING_URL }}/api/v1/query" \
          -H "Content-Type: application/json" \
          -d '{"query": "Health check test", "max_context": 1, "similarity_threshold": 0.1}' \
          || exit 1
          
    - name: Notify team
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    if: |
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.environment == 'production' ||
      (github.event_name == 'workflow_run' && 
       github.event.workflow_run.conclusion == 'success' &&
       github.ref == 'refs/heads/main')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        pip install -e .[dev]
        cd frontend && npm ci
        
    - name: Run database migrations
      run: |
        alembic upgrade head
      env:
        DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        
    - name: Build frontend
      run: |
        cd frontend && npm run build
        
    - name: Create deployment artifact
      run: |
        tar -czf agentic-rag-${{ github.sha }}.tar.gz \
          backend/ \
          frontend/dist/ \
          alembic.ini \
          requirements.txt \
          pyproject.toml \
          start.py
          
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: deployment-artifact
        path: agentic-rag-${{ github.sha }}.tar.gz
        retention-days: 30
        
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production environment..."
        
        # Blue-green deployment strategy
        # Deploy to green environment first
        docker build -t agentic-rag:production .
        docker tag agentic-rag:production ${{ secrets.PRODUCTION_REGISTRY }}/agentic-rag:green
        docker push ${{ secrets.PRODUCTION_REGISTRY }}/agentic-rag:green
        
        # Update green deployment
        # kubectl apply -f k8s/production-green/
        # kubectl wait --for=condition=ready pod -l app=agentic-rag-green --timeout=300s
        
        # Run health checks on green
        GREEN_URL="${{ secrets.PRODUCTION_URL_GREEN }}"
        curl -f $GREEN_URL/api/v1/health || exit 1
        
        # Switch traffic to green
        # kubectl patch service agentic-rag -p '{"spec":{"selector":{"version":"green"}}}'
        
        # Wait for traffic switch
        sleep 60
        
        # Verify production health
        curl -f ${{ secrets.PRODUCTION_URL }}/api/v1/health || exit 1
        
        # Update blue (previous version)
        # kubectl apply -f k8s/production-blue/
        
    - name: Comprehensive health check
      run: |
        echo "🏥 Running comprehensive health checks..."
        
        # Basic health check
        curl -f ${{ secrets.PRODUCTION_URL }}/api/v1/health
        
        # Configuration check
        curl -f ${{ secrets.PRODUCTION_URL }}/api/v1/config
        
        # Load test
        for i in {1..10}; do
          curl -X POST "${{ secrets.PRODUCTION_URL }}/api/v1/query" \
            -H "Content-Type: application/json" \
            -d '{"query": "Load test query", "max_context": 1, "similarity_threshold": 0.1}' &
        done
        wait
        
    - name: Run integration tests
      run: |
        echo "🧪 Running integration tests..."
        pytest -m integration --base-url=${{ secrets.PRODUCTION_URL }}
        
    - name: Performance monitoring setup
      run: |
        echo "📊 Setting up performance monitoring..."
        # Configure monitoring alerts
        curl -X POST "${{ secrets.MONITORING_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "deployment": "'${{ github.sha }}'",
            "environment": "production",
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          }'
          
    - name: Create deployment tag
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag -a "deploy-$(date +%Y%m%d-%H%M%S)" -m "Deployment: ${{ github.sha }}"
        git push origin --tags
        
    - name: Update documentation
      run: |
        echo "📚 Updating deployment documentation..."
        # Update deployment status in docs
        # This could trigger a separate workflow to update docs site
        
    - name: Notify team
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        text: |
          🚀 Production Deployment Complete!
          
          • Version: ${{ github.sha }}
          • Environment: Production
          • Status: ${{ job.status }}
          • URL: ${{ secrets.PRODUCTION_URL }}
          
          📊 Deployment metrics available in monitoring dashboard.
      if: always()
      
    - name: Rollback on failure
      if: failure()
      run: |
        echo "🔄 Rolling back deployment..."
        
        # Switch back to blue (previous version)
        # kubectl patch service agentic-rag -p '{"spec":{"selector":{"version":"blue"}}}'
        
        # Wait for rollback
        sleep 30
        
        # Verify rollback health
        curl -f ${{ secrets.PRODUCTION_URL }}/api/v1/health || exit 1
        
        # Notify rollback
        curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "🔄 Rollback completed due to deployment failure",
            "channel": "#deployments",
            "deployment": "'${{ github.sha }}'"
          }'

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run security scan
      run: |
        echo "🔒 Running security vulnerability scan..."
        
        # Scan for vulnerabilities in dependencies
        pip install safety
        safety check --json --output safety-report.json || true
        
        # Scan container images
        docker pull ${{ secrets.PRODUCTION_REGISTRY }}/agentic-rag:production
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image ${{ secrets.PRODUCTION_REGISTRY }}/agentic-rag:production \
          --format json --output trivy-report.json || true
          
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          safety-report.json
          trivy-report.json
        retention-days: 90
        
    - name: Notify on security issues
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#security'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        text: |
          🚨 Security issues detected in deployment!
          
          Please review the security reports and address vulnerabilities before proceeding.

  post-deployment-tests:
    name: Post-Deployment Tests
    runs-on: ubuntu-latest
    needs: deploy-production
    if: needs.deploy-production.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install test dependencies
      run: pip install -e .[test]
      
    - name: Run end-to-end tests
      run: |
        echo "🧪 Running end-to-end tests against production..."
        pytest -m e2e --base-url=${{ secrets.PRODUCTION_URL }}
        
    - name: Performance benchmarks
      run: |
        echo "📊 Running performance benchmarks..."
        python -m backend.scripts.benchmark --url=${{ secrets.PRODUCTION_URL }}
        
    - name: Load testing
      run: |
        echo "⚡ Running load tests..."
        # Use a load testing tool like k6 or locust
        # k6 run --vus 10 --duration 30s scripts/load-test.js
        
    - name: Generate deployment report
      run: |
        echo "📋 Generating deployment report..."
        cat > deployment-report.md << EOF
        # Deployment Report
        
        ## Deployment Information
        - **Commit**: ${{ github.sha }}
        - **Branch**: ${{ github.ref_name }}
        - **Environment**: Production
        - **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
        
        ## Test Results
        - **Health Check**: ✅ Passed
        - **Integration Tests**: ✅ Passed
        - **E2E Tests**: ✅ Passed
        - **Performance Tests**: ✅ Passed
        - **Load Tests**: ✅ Passed
        
        ## Metrics
        - **Response Time**: <200ms
        - **Success Rate**: 99.9%
        - **Uptime**: 100%
        
        ## Links
        - [Application](${{ secrets.PRODUCTION_URL }})
        - [Monitoring Dashboard](${{ secrets.MONITORING_URL }})
        - [Logs](${{ secrets.LOGS_URL }})
        EOF
        
    - name: Upload deployment report
      uses: actions/upload-artifact@v3
      with:
        name: deployment-report
        path: deployment-report.md
        retention-days: 90
